services:

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage

  web:
    build: .
    ports:
      - "7008:8000"
    volumes:
      - ./app:/app
      - ./images:/app/images
      - ./thumbnails:/app/thumbnails
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant

  ingest:
    build: .
    command: python app/ingest.py
    volumes:
      - ./app:/app
      - ./images:/app/images
      - ./thumbnails:/app/thumbnails
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    # Run once and exit
    profiles:
      - ingest
